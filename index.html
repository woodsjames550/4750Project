<script>
const SUPABASE_URL      = 'https://zwpiidesewukqxanowng.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_KEY_HERE';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================
   HELPER: GET OR CREATE MEMBER
========================= */
async function getOrCreateMember(name) {
    let { data } = await db.from('members').select('*').eq('name', name).single();

    if (!data) {
        const res = await db.from('members')
            .insert({ name })
            .select()
            .single();
        return res.data;
    }
    return data;
}

/* =========================
   HELPER: GET OR CREATE ITEM
========================= */
async function getOrCreateItem(name) {
    let { data } = await db.from('items').select('*').eq('name', name).single();

    if (!data) {
        const res = await db.from('items')
            .insert({ name })
            .select()
            .single();
        return res.data;
    }
    return data;
}

/* =========================
   HELPER: GET OR CREATE EVENT
========================= */
async function getOrCreateEvent(name) {
    let { data } = await db.from('events').select('*').eq('name', name).single();

    if (!data) {
        const res = await db.from('events')
            .insert({ name })
            .select()
            .single();
        return res.data;
    }
    return data;
}

/* =========================
   CHECK-IN
========================= */
async function loadRecentCheckins() {
    const { data } = await db
        .from('checkins')
        .select('checked_in_at, members(name)')
        .order('checked_in_at', { ascending: false })
        .limit(8);

    const list = document.getElementById('recentCheckins');

    if (!data || data.length === 0) {
        list.innerHTML = '<p>No check-ins yet.</p>';
        return;
    }

    list.innerHTML = data.map(c => {
        const name = c.members?.name || 'Unknown';
        const time = new Date(c.checked_in_at).toLocaleTimeString();
        return `<div>${name} - ${time}</div>`;
    }).join('');
}

document.getElementById('checkinForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const name = document.getElementById('memberName').value.trim();
    const member = await getOrCreateMember(name);

    await db.from('checkins').insert({
        member_id: member.id
    });

    loadRecentCheckins();
});

loadRecentCheckins();

/* =========================
   POSTS
========================= */
async function loadPosts() {
    const { data } = await db
        .from('posts')
        .select('*, members(name)')
        .order('created_at', { ascending: false });

    const feed = document.getElementById('postsFeed');

    if (!data || data.length === 0) {
        feed.innerHTML = '<p>No posts yet.</p>';
        return;
    }

    feed.innerHTML = data.map(p => `
        <div>
            <strong>${p.members?.name || 'Anonymous'}</strong>
            <p>${p.content}</p>
            <small>${p.likes} likes</small>
        </div>
    `).join('');
}

document.getElementById('postBtn').addEventListener('click', async () => {
    const content = document.getElementById('postContent').value.trim();
    const name = document.getElementById('postAuthor').value.trim() || 'Anonymous';

    const member = await getOrCreateMember(name);

    await db.from('posts').insert({
        content,
        member_id: member.id,
        likes: 0
    });

    loadPosts();
});

loadPosts();

/* =========================
   RENTALS
========================= */
document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.rental-btn');
    if (!btn) return;

    const itemName = btn.dataset.rental;
    const memberName = prompt("Enter your name");

    if (!memberName) return;

    const member = await getOrCreateMember(memberName);
    const item = await getOrCreateItem(itemName);

    await db.from('rentals').insert({
        item_id: item.id,
        member_id: member.id
    });

    alert("Rental submitted");
});

/* =========================
   DAYCARE
========================= */
document.getElementById('daycareBookingForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const parentName = document.getElementById('parentName').value;
    const childName  = document.getElementById('childName').value;
    const childAge   = parseInt(document.getElementById('childAge').value) || 1;

    const parent = await getOrCreateMember(parentName);

    let { data: child } = await db
        .from('children')
        .select('*')
        .eq('name', childName)
        .eq('parent_id', parent.id)
        .single();

    if (!child) {
        const res = await db.from('children')
            .insert({
                name: childName,
                age: childAge,
                parent_id: parent.id
            })
            .select()
            .single();
        child = res.data;
    }

    await db.from('daycare_bookings').insert({
        child_id: child.id,
        booking_date: document.getElementById('bookingDate').value,
        start_time: document.getElementById('startTime').value,
        duration: document.getElementById('duration').value,
        special_notes: document.getElementById('specialNotes').value
    });

    alert("Daycare booked");
});

/* =========================
   RSVP
========================= */
document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.rsvp-btn');
    if (!btn) return;

    const eventName = btn.dataset.event;
    const memberName = prompt("Enter your name");

    if (!memberName) return;

    const member = await getOrCreateMember(memberName);
    const event = await getOrCreateEvent(eventName);

    await db.from('rsvps').insert({
        event_id: event.id,
        member_id: member.id
    });

    btn.textContent = "✓ RSVP'd";
});
</script>
